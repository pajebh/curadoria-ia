app = "curadoria-api"
primary_region = "gru"

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  min_machines_running = 2

  [http_service.concurrency]
    type = "requests"
    hard_limit = 200
    soft_limit = 150

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/v1/health/ia"
    timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

[env]
  ENVIRONMENT = "production"
  LOG_LEVEL = "INFO"
